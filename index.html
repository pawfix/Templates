<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Templates</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="prism.css">
    <link rel="stylesheet" href="blockyBackground/block.css">
    <link rel="stylesheet" href="prism2.css">
    <link rel="stylesheet" href="popUp/popup.css">
</head>
<body>

    <div class="code" id="codeDisplay">
        <pre><code  id="code"></code></pre>
        <button type="button" id="closeButton" data-state="1">Close</button>
    </div>
    <section class="blockyBackground">
        <h1>Blocky Background</h1>
        <p>A template for a background that makes blocks appear on hover</p>
        <div class="blockyDisplay blockContainer displayPreview" id="blockyDisplay">
        </div>
        <div class="blockyWrap interactWrap">
            <label for="blockHeightRange">Block Height</label>
            <input type="range" name="blockHeight" id="blockHeightRange" value="100" min="20" max="500">
            <label for="blockWidthRange">Block Width</label>
            <input type="range" name="blockWidth" id="blockWidthRange" value="100" min="20" max="500">
            <button type="button" id="blockyGetCode" data-code="blockyBackground/index.js">Get Code</button>
            <button type="button" id="blockyFullDemo">View full demo</button>
        </div>
    </section>
    <section class="gradientBackground">
        <h1>Gradient Background</h1>
        <p>A template for a Gradient background, that follows your cursor</p>
        <div class="gradientDisplay displayPreview" id="gradientDisplay"></div>
        <div class="gradientWrap interactWrap">
            <label for="gradientMainColor">Main color</label>
            <input type="color" name="gradientMainColor" id="gradientMainColor">
            <label for="gradientSecondaryColor">Secondary color</label>
            <input type="color" name="gradientSecondaryColor" id="gradientSecondaryColor">
            <button id="gradientGetCode" data-code="gradientBackground/index.js">Get Code</button>
            <button id="gradientFullDemo">View Full Demo</button>
        </div>
    </section>
    <section class="popUpSystem">
        <h1>A Pop-up system</h1>
        <div class="exampleButtons displayPreview">
            <select id="warningLevel">
                <option value="warning">Warning</option>
                <option value="alert">Alert</option>
                <option value="info">Info</option>
            </select>
            <button class="popUpMake" data-position="center">Create a pop-up in the Center</button>
            <button class="popUpMake" data-position="top">Create a pop-up in the Top</button>
            <button class="popUpMake" data-position="bottom">Create a pop-up in the Bottom</button>
            <button class="popUpMake" data-position="left">Create a pop-up in the Left</button>
            <button class="popUpMake" data-position="right">Create a pop-up in the Right</button>
            <button class="popUpMake" data-position="top-left">Create a pop-up in the Top Left</button>
            <button class="popUpMake" data-position="top-right">Create a pop-up in the Top Right</button>
            <button class="popUpMake" data-position="bottom-left">Create a pop-up in the Bottom Left</button>
            <button class="popUpMake" data-position="bottom-right">Create a pop-up in the Bottom Right</button>
        </div>
        <div class="popUpWrap interactWrap">
            <button id="popUpCode" data-code="popUp/index.js">Get Code</button>
            <button id="popUpFull">View Full Demo</button>
        </div>
    </section>

    <script src="./prism.js"></script>
    <script src="./gradientBackground/index.js"></script>
    <script src="./blockyBackground/index.js"></script>
    <script src="./index.js"></script>
    <script src="popUp/index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const blockWidthRange = document.getElementById('blockWidthRange');
            const blockHeightRange = document.getElementById('blockHeightRange');
            const blockyFullDemo = document.getElementById('blockyFullDemo');
            const blockyGetCode = document.getElementById('blockyGetCode');
            blockyGetCode.addEventListener('click', () => {

                displayCode(blockyGetCode.dataset.code)
            })
            blockyFullDemo.addEventListener('click', () => {
                location.href = "blockyBackground/index.html"
            })

            const gradientGetCode = document.getElementById('gradientGetCode');
            gradientGetCode.addEventListener('click', () => {
                displayCode(gradientGetCode.dataset.code);
            })
            const gradientViewDemo = document.getElementById('gradientFullDemo');
            gradientViewDemo.addEventListener('click', () => {
                location.href = "gradientBackground/index.html"
            })

            const gradientMainColor = document.getElementById('gradientMainColor');
            const gradientSecondaryColor = document.getElementById('gradientSecondaryColor');
            gradientMainColor.addEventListener('change', () => {
                createGradientBackground(document.getElementById('gradientDisplay'), gradientMainColor.value, gradientSecondaryColor.value);
            })

            gradientSecondaryColor.addEventListener('change', () => {
                createGradientBackground(document.getElementById('gradientDisplay'), gradientMainColor.value, gradientSecondaryColor.value);
            })

            createGradientBackground(document.getElementById('gradientDisplay'), "red", "blue");

            createBackgroundBlocks(document.getElementById('blockyDisplay'), 100, 100);
            const codeDisplay = document.getElementById('codeDisplay');
            const closeButton = document.getElementById('closeButton');
            closeButton.addEventListener('click', () => {
                codeDisplay.style.display = "none";
            })
            blockHeightRange.addEventListener('change', () => {
                createBackgroundBlocks(document.getElementById('blockyDisplay'), blockHeightRange.value, blockWidthRange.value);
            })
            blockWidthRange.addEventListener('change', () => {
                createBackgroundBlocks(document.getElementById('blockyDisplay'), blockHeightRange.value, blockWidthRange.value);
            })

            const popUpCode = document.getElementById('popUpCode');
            const popUpFullDemo = document.getElementById('popUpFull');
            popUpCode.addEventListener('click', () => {
                displayCode(popUpCode.dataset.code);
            })
            popUpFullDemo.addEventListener('click', () => {
                location.href = "popUp/index.html"
            })

            document.querySelectorAll('.popUpMake').forEach(element => {
                element.addEventListener('click', function() {
                    const warningLevel = document.getElementById('warningLevel').value;
                    createPopup(document.body, element.dataset.position, warningLevel, "Example popup", `Example content of a popup of level ${warningLevel}`, 1500);
                });
            })
        })
    </script>
</body>
</html>
